# Beta environment overrides
# Staging / pre-production environment

namespace: elder

# Global settings for beta
global:
  imageRegistry: ""
  imagePullSecrets:
    - name: ghcr-pull-secret

# PostgreSQL - 1 replica for beta (RWO PVC cannot be multi-attached)
postgres:
  enabled: true
  replicaCount: 1
  image:
    repository: postgres
    tag: 17-bookworm@sha256:cf50a40bb0320a49a95725335bb1683cb627f9c70350100ca57c41f863d684f4
    pullPolicy: IfNotPresent
  env:
    POSTGRES_DB: elder
    POSTGRES_USER: elder
    POSTGRES_PASSWORD: elder_beta_password
    POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    PGDATA: /var/lib/postgresql/data/pgdata
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "longhorn"

# Redis - 1 replica for beta (RWO PVC cannot be multi-attached)
redis:
  enabled: true
  replicaCount: 1
  image:
    repository: redis
    tag: 7-bookworm@sha256:24ea35ee039d7345bef2377611e3b1a615231746de4cfea74c1414575ee56167
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "longhorn"

# Elder Web UI - 2 replicas for beta
web:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/penguintechinc/elder-web
    tag: 3.2.0.1776092439-beta
    pullPolicy: Always
  buildArgs:
    VITE_API_URL: ""
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Elder Flask API - 2 replicas for beta
api:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/penguintechinc/elder-api
    tag: 3.2.0.1776092439-beta
    pullPolicy: Always
  env:
    FLASK_ENV: production
    SECRET_KEY: "CHANGE-IN-PRODUCTION-BETA"
    SITE_URL: "https://elder.penguintech.cloud"
    LOG_LEVEL: INFO
    RELEASE_MODE: "false"
    GRPC_REQUIRE_LICENSE: "true"
    LICENSE_SERVER_URL: "https://license.penguintech.io"
    DB_HOST: elder-postgres
    DB_PASSWORD: elder_beta_password
    DATABASE_URL: "postgresql://elder:elder_beta_password@elder-postgres:5432/elder"
    REDIS_HOST: elder-redis
    REDIS_URL: "redis://:elder_redis_password@elder-redis:6379/0"
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Scanner Service - 2 replicas for beta
scanner:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/penguintechinc/elder-scanner
    tag: 3.2.0.1776092439-beta
    pullPolicy: Always
  env:
    SCANNER_POLL_INTERVAL: "300"
    LOG_LEVEL: INFO
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  screenshotStorage:
    sizeLimit: "2Gi"

# Worker Service - 2 replicas for beta
worker:
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/penguintechinc/elder-worker
    tag: 3.2.0.1776092439-beta
    pullPolicy: Always
  env:
    LOG_LEVEL: INFO
    LOG_FORMAT: json
    SYNC_ON_STARTUP: "true"
    DATABASE_URL: ""
    DATABASE_READ_URL: ""
    DB_POOL_SIZE: "10"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  credentialsSecret:
    name: ""

# Prometheus - Enabled in beta
prometheus:
  enabled: true
  replicaCount: 1
  image:
    repository: prom/prometheus
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "longhorn"

# Alertmanager - Enabled in beta
alertmanager:
  enabled: true
  replicaCount: 1
  image:
    repository: prom/alertmanager
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "longhorn"

# Grafana - Enabled in beta
grafana:
  enabled: true
  replicaCount: 1
  image:
    repository: grafana/grafana
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "longhorn"

# Ingress - Enabled in beta with TLS
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: elder.penguintech.cloud
      paths:
        - path: /
          pathType: Prefix
          service: web
          port: 3000
        - path: /api
          pathType: Prefix
          service: api
          port: 5000
  tls:
    - secretName: penguintech-cloud-wildcard-tls
      hosts:
        - elder.penguintech.cloud

# Service Account
serviceAccount:
  create: false
  name: ""

# Pod Security Context
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

# Security Context - Strict for beta
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Node affinity for production nodes
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node-role.kubernetes.io/production
              operator: In
              values:
                - "true"
