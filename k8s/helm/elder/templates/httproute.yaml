{{- if .Values.gateway.enabled -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "elder.fullname" . }}-routes
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: shared
    namespace: gateway
    sectionName: https
  hostnames:
  - {{ .Values.gateway.host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    timeouts:
      request: {{ .Values.gateway.timeouts.request | default "300s" }}
    backendRefs:
    - name: {{ include "elder.fullname" . }}-api
      port: 5000
  - matches:
    - path:
        type: PathPrefix
        value: /
    timeouts:
      request: {{ .Values.gateway.timeouts.request | default "300s" }}
    backendRefs:
    - name: {{ include "elder.fullname" . }}-web
      port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "elder.fullname" . }}-http-redirect
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: shared
    namespace: gateway
    sectionName: http
  hostnames:
  - {{ .Values.gateway.host | quote }}
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
{{- end }}
