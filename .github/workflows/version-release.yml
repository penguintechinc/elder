name: Create Release on Version Change

on:
  push:
    branches:
      - main
    paths:
      - '.version'  # Trigger only on .version file changes (epoch64 monitoring)

jobs:
  create-release:
    name: Create Pre-Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2

      - name: Check if .version file exists
        id: check_version
        run: |
          if [ ! -f .version ]; then
            echo "0.0.0" > .version
            echo "version=0.0.0" >> $GITHUB_OUTPUT
            echo "full_version=0.0.0" >> $GITHUB_OUTPUT
            echo "epoch64=" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            # Read .version file and remove whitespace
            VERSION=$(cat .version | tr -d '[:space:]')

            # Validate format: vMajor.Minor.Patch.epoch64
            # Example: 3.0.0.1764083000
            if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
              echo "Invalid version format: $VERSION (expected vMajor.Minor.Patch[.epoch64])"
              exit 1
            fi

            # Extract semantic version (first 3 segments)
            SEMVER=$(echo "$VERSION" | cut -d'.' -f1-3)

            # Extract epoch64 (4th segment if present)
            EPOCH64=$(echo "$VERSION" | cut -d'.' -f4 -s)
            if [ -z "$EPOCH64" ]; then
              # If no epoch64, use current Unix timestamp
              EPOCH64=$(date +%s)
            fi

            echo "version=$SEMVER" >> $GITHUB_OUTPUT
            echo "full_version=$VERSION" >> $GITHUB_OUTPUT
            echo "epoch64=$EPOCH64" >> $GITHUB_OUTPUT

            # Check if version is default (0.0.0)
            if [ "$SEMVER" = "0.0.0" ]; then
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "Version is default (0.0.0), skipping release"
            else
              echo "should_release=true" >> $GITHUB_OUTPUT
              echo "Version is $SEMVER with epoch64=$EPOCH64, proceeding with release"
            fi
          fi

      - name: Check if release already exists
        id: check_release
        if: steps.check_version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v$VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release v$VERSION does not exist, will create"
          fi

      - name: Extract release notes from RELEASE_NOTES.md
        id: extract_notes
        if: steps.check_version.outputs.should_release == 'true' && steps.check_release.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          RELEASE_NOTES_FILE="docs/RELEASE_NOTES.md"

          if [ -f "$RELEASE_NOTES_FILE" ]; then
            echo "Found $RELEASE_NOTES_FILE, extracting notes for v$VERSION..."

            # Extract the section for this version
            # Looks for ## [X.Y.Z] and captures until the next ## [
            # Using awk for more reliable multi-line extraction
            NOTES=$(awk -v ver="$VERSION" '
              BEGIN { found=0; printing=0 }
              /^## \[/ {
                if (printing) exit
                if ($0 ~ "\\[" ver "\\]") {
                  found=1
                  printing=1
                  next
                }
              }
              printing { print }
            ' "$RELEASE_NOTES_FILE")

            if [ -n "$NOTES" ]; then
              echo "found_notes=true" >> $GITHUB_OUTPUT
              # Save notes to a file for later use (handles multi-line)
              echo "$NOTES" > extracted_notes.md
              echo "Extracted release notes for v$VERSION"
            else
              echo "found_notes=false" >> $GITHUB_OUTPUT
              echo "No release notes found for v$VERSION in $RELEASE_NOTES_FILE"
            fi
          else
            echo "found_notes=false" >> $GITHUB_OUTPUT
            echo "$RELEASE_NOTES_FILE not found"
          fi

      - name: Generate release notes
        id: release_notes
        if: steps.check_version.outputs.should_release == 'true' && steps.check_release.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          FULL_VERSION="${{ steps.check_version.outputs.full_version }}"
          EPOCH64="${{ steps.check_version.outputs.epoch64 }}"

          # Convert epoch64 to human-readable date
          if command -v date &> /dev/null; then
            BUILD_DATE=$(date -d @${EPOCH64} -u +"%Y-%m-%d %H:%M:%S UTC" 2>/dev/null || date -u -r ${EPOCH64} +"%Y-%m-%d %H:%M:%S UTC" 2>/dev/null || echo "Build timestamp: ${EPOCH64}")
          else
            BUILD_DATE="Build timestamp: ${EPOCH64}"
          fi

          # Start building release notes
          cat << 'HEADER' > release_notes.md
          ## Release v$VERSION

          HEADER

          # Replace variables in header
          sed -i "s/\$VERSION/$VERSION/g" release_notes.md

          # Add extracted notes from RELEASE_NOTES.md if found
          if [ "${{ steps.extract_notes.outputs.found_notes }}" = "true" ] && [ -f extracted_notes.md ]; then
            echo "" >> release_notes.md
            cat extracted_notes.md >> release_notes.md
            echo "" >> release_notes.md
            echo "---" >> release_notes.md
            echo "" >> release_notes.md
          fi

          # Add version metadata
          cat << EOF >> release_notes.md
          ### Version Details

          | Property | Value |
          |----------|-------|
          | Semantic Version | \`$VERSION\` |
          | Full Version | \`$FULL_VERSION\` |
          | Epoch64 Timestamp | \`$EPOCH64\` |
          | Build Date | $BUILD_DATE |
          | Commit | \`${{ github.sha }}\` |
          | Branch | \`${{ github.ref_name }}\` |

          ### Installation

          Pull the latest Docker image:
          \`\`\`bash
          docker pull ghcr.io/${{ github.repository_owner }}/elder:v$VERSION
          docker pull ghcr.io/${{ github.repository_owner }}/elder:$FULL_VERSION
          \`\`\`

          ---
          *This pre-release was automatically generated when the .version file was updated.*
          EOF

          echo "Generated release notes:"
          cat release_notes.md

      - name: Create pre-release
        if: steps.check_version.outputs.should_release == 'true' && steps.check_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release_notes.md \
            --prerelease \
            --target ${{ github.sha }}

          echo "✅ Created pre-release v$VERSION"

      - name: Skip release (version is default or release exists)
        if: steps.check_version.outputs.should_release != 'true' || steps.check_release.outputs.exists == 'true'
        run: |
          if [ "${{ steps.check_version.outputs.should_release }}" != "true" ]; then
            echo "⏭️ Skipping release - version is 0.0.0 (default)"
          else
            echo "⏭️ Skipping release - v${{ steps.check_version.outputs.version }} already exists"
          fi
